[build]
builder = "nixpacks"

[[services]]
name = "api"
root = "backend"
[services.deploy]
startCommand = "node src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "web"
root = "frontend"
[services.build]
cmd = "npm run build"
[services.deploy]
startCommand = "next start"
