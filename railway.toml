[build]
builder = "nixpacks"

[[services]]
name = "api"
root = "backend"
[services.deploy]
startCommand = "npx prisma db push --accept-data-loss && node src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "web"
root = "frontend"
[services.deploy]
startCommand = "npm run start"
