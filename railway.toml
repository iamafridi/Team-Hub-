[build]
builder = "nixpacks"

[[services]]
name = "api"
root = "backend"
[services.deploy]
startCommand = "npx prisma db push --accept-data-loss && node src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "web"
root = "."
[services.build]
cmd = "npm run build -w @team-hub/web"
[services.deploy]
startCommand = "npm run start -w @team-hub/web"
